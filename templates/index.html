<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vis-link</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #212529;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }
    header {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.5px; }
    #status {
      font-size: 0.8rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-weight: 500;
    }
    .status-connecting { background: #fff3cd; color: #856404; }
    .status-connected  { background: #d1e7dd; color: #0f5132; }
    .status-disconnected { background: #f8d7da; color: #842029; }
    #session-box {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    #session-box label { font-size: 0.85rem; color: #6c757d; white-space: nowrap; }
    #session-id {
      font-family: monospace;
      font-size: 1rem;
      color: #0d6efd;
      word-break: break-all;
    }
    #copy-btn {
      margin-left: auto;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      border: 1px solid #0d6efd;
      border-radius: 4px;
      background: transparent;
      color: #0d6efd;
      cursor: pointer;
    }
    #copy-btn:hover { background: #0d6efd; color: #fff; }
    #vis-container {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      justify-content: center;
    }
    #vis { width: 100%; }
  </style>
</head>
<body>
  <header>
    <h1>vis-link</h1>
    <span id="status" class="status-connecting">Connecting…</span>
  </header>

  <div id="session-box">
    <label>Session ID</label>
    <span id="session-id">—</span>
    <button id="copy-btn" onclick="copySession()">Copy</button>
  </div>

  <div id="vis-container">
    <div id="vis"></div>
  </div>

  <script>
    const WS_URL = "{{ ws_url }}";
    const statusEl = document.getElementById("status");
    const sessionEl = document.getElementById("session-id");

    function setStatus(state) {
      statusEl.className = "status-" + state;
      statusEl.textContent = state.charAt(0).toUpperCase() + state.slice(1);
    }

    function copySession() {
      const text = sessionEl.textContent;
      if (text && text !== "—") {
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.textContent = "Copied!";
          setTimeout(() => { btn.textContent = "Copy"; }, 1500);
        });
      }
    }

    function connect() {
      setStatus("connecting");
      const ws = new WebSocket(WS_URL);

      ws.addEventListener("open", () => setStatus("connected"));

      ws.addEventListener("message", (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === "session_id") {
          sessionEl.textContent = msg.session_id;
          document.title = "vis-link — " + msg.session_id.slice(0, 8);
        }

        if (msg.type === "set_spec") {
          vegaEmbed("#vis", msg.spec, { actions: true }).catch(console.error);
        }
      });

      ws.addEventListener("close", () => {
        setStatus("disconnected");
        setTimeout(connect, 3000);
      });

      ws.addEventListener("error", () => {
        setStatus("disconnected");
      });
    }

    connect();
  </script>
</body>
</html>
